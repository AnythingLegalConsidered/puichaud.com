<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ianis — prototype zoom UI</title>
<style>
  :root {
    --bg: #0f1117;
    --text: #d8dee9;
    --text-dim: #8b93a7;
    --accent: #7aa2f7;
    --green: #9ece6a;
    --yellow: #e0af68;
    --mauve: #bb9af7;
    --bubble-border: rgba(122,162,247,.35);
    --bubble-bg: rgba(122,162,247,.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse at 30% 20%, #161a26 0%, transparent 60%),
      radial-gradient(ellipse at 75% 80%, #131722 0%, transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    user-select: none;
  }

  /* ============ CAMERA / WORLD ============ */
  #viewport { position: fixed; inset: 0; overflow: hidden; }
  #world { position: absolute; left: 0; top: 0; transform-origin: 0 0; will-change: transform; }

  /* ============ NODES ============ */
  /* Every node is authored in a fixed 600x600 box, then scaled into world space. */
  .node {
    position: absolute;
    width: 600px; height: 600px;
    transform-origin: 0 0;
  }
  .node .disc {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 2px solid var(--bubble-border);
    background: radial-gradient(circle at 35% 30%, rgba(122,162,247,.10), rgba(122,162,247,.02) 70%), var(--bubble-bg);
    transition: border-color .3s, box-shadow .3s, background .3s;
  }
  .node.clickable { cursor: pointer; }
  .node.clickable:hover > .disc {
    border-color: var(--accent);
    box-shadow: 0 0 60px rgba(122,162,247,.18), inset 0 0 50px rgba(122,162,247,.06);
  }
  .node.open > .disc { border-color: rgba(122,162,247,.55); cursor: default; }
  .node.plain > .disc { display: none; }

  /* far / near : semantic zoom layers */
  .node .far, .node .near {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    border-radius: 50%;
    transition: opacity .45s ease;
    padding: 60px;
  }
  .node .far { opacity: 1; }
  .node .near { opacity: 0; pointer-events: none; }
  .node.open .far { opacity: 0; pointer-events: none; }
  .node.open .near { opacity: 1; pointer-events: auto; }

  .far .f-icon { font-size: 84px; margin-bottom: 14px; }
  .far .f-label { font-size: 56px; font-weight: 700; letter-spacing: -1px; }
  .far .f-sub { font-size: 24px; color: var(--text-dim); margin-top: 10px; }
  .far .f-hint { font-size: 18px; color: var(--accent); margin-top: 22px; opacity: .8; }

  /* ============ HERO (plain node) ============ */
  .hero h1 { font-size: 64px; font-weight: 800; letter-spacing: -2px; }
  .hero .h-role { font-size: 30px; color: var(--accent); margin-top: 8px; font-weight: 600; }
  .hero .h-meta { font-size: 22px; color: var(--text-dim); margin-top: 14px; line-height: 1.5; }
  .hero .h-badge {
    display: inline-block; margin-top: 20px;
    font-size: 20px; font-weight: 600; color: var(--green);
    border: 1.5px solid var(--green); border-radius: 30px;
    padding: 8px 24px;
  }
  .hero .h-ctas { display: flex; gap: 16px; margin-top: 26px; justify-content: center; }
  .hero .h-ctas a {
    font-size: 20px; font-weight: 600; text-decoration: none;
    padding: 12px 28px; border-radius: 10px;
  }
  .hero .h-ctas a.primary { background: var(--accent); color: #0f1117; }
  .hero .h-ctas a.ghost { border: 1.5px solid var(--accent); color: var(--accent); }
  .hero .h-scroll-hint { margin-top: 30px; font-size: 17px; color: var(--text-dim); opacity: .7; }

  /* ============ NEAR CONTENT (detail layers) ============ */
  .near h2 { font-size: 34px; font-weight: 700; }
  .near .n-sub { font-size: 16px; color: var(--text-dim); margin-top: 4px; margin-bottom: 14px; }
  .near .n-body { font-size: 15px; line-height: 1.6; color: var(--text); text-align: left; }
  .near .n-body p { margin-bottom: 8px; }
  .near .n-body ul { padding-left: 18px; }
  .near .n-body li { margin-bottom: 4px; }
  .near .n-body b { color: var(--accent); }

  /* section title pinned at top of an open bubble (children live below) */
  .near.has-children { justify-content: flex-start; padding-top: 70px; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; justify-content: center; }
  .tag {
    font-size: 12px; font-family: Consolas, monospace;
    padding: 2px 10px; border-radius: 10px;
    background: rgba(122,162,247,.12); color: var(--accent);
    border: 1px solid rgba(122,162,247,.3);
  }
  .stats { display: flex; gap: 10px; margin-top: 14px; justify-content: center; flex-wrap: wrap; }
  .stat { text-align: center; background: rgba(255,255,255,.04); border-radius: 10px; padding: 8px 14px; }
  .stat b { display: block; font-size: 19px; color: var(--green); font-family: Consolas, monospace; }
  .stat span { font-size: 11px; color: var(--text-dim); }

  /* timeline (parcours) */
  .tl { text-align: left; font-size: 15px; line-height: 1.45; }
  .tl .tl-item { display: flex; gap: 12px; margin-bottom: 10px; }
  .tl .tl-dot { color: var(--accent); font-family: Consolas, monospace; white-space: nowrap; font-size: 13px; padding-top: 2px; min-width: 86px; text-align: right; }
  .tl .tl-txt b { display: block; }
  .tl .tl-txt span { color: var(--text-dim); font-size: 13px; }

  /* skills two groups */
  .skills { display: flex; gap: 22px; text-align: left; font-size: 14px; }
  .skills h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .5px; color: var(--accent); margin-bottom: 8px; }
  .skills ul { list-style: none; }
  .skills li { margin-bottom: 5px; color: var(--text); }
  .skills li span { color: var(--text-dim); font-size: 12px; }

  /* contact */
  .ct { font-size: 17px; line-height: 2; }
  .ct a { color: var(--accent); text-decoration: none; }
  .ct a:hover { text-decoration: underline; }

  /* ============ HUD ============ */
  #breadcrumb {
    position: fixed; top: 16px; left: 18px; z-index: 100;
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; font-family: Consolas, monospace;
  }
  #breadcrumb .bc {
    color: var(--text-dim); cursor: pointer;
    padding: 5px 10px; border-radius: 7px;
    background: rgba(15,17,23,.7); backdrop-filter: blur(8px);
    border: 1px solid rgba(122,162,247,.15);
  }
  #breadcrumb .bc:hover { color: var(--text); border-color: var(--accent); }
  #breadcrumb .bc.current { color: var(--accent); cursor: default; border-color: rgba(122,162,247,.4); }
  #breadcrumb .sep { color: var(--text-dim); opacity: .5; }

  #back-btn {
    position: fixed; bottom: 20px; left: 18px; z-index: 100;
    display: none; align-items: center; gap: 8px;
    font-size: 14px; color: var(--text);
    background: rgba(15,17,23,.7); backdrop-filter: blur(8px);
    border: 1px solid rgba(122,162,247,.3); border-radius: 10px;
    padding: 9px 16px; cursor: pointer;
  }
  #back-btn:hover { border-color: var(--accent); color: var(--accent); }
  #back-btn.visible { display: flex; }

  #hint {
    position: fixed; bottom: 20px; right: 18px; z-index: 100;
    font-size: 12.5px; color: var(--text-dim);
    background: rgba(15,17,23,.7); backdrop-filter: blur(8px);
    border: 1px solid rgba(122,162,247,.15); border-radius: 10px;
    padding: 8px 14px;
  }
  #hint kbd {
    background: rgba(122,162,247,.15); border-radius: 4px;
    padding: 0 6px; font-family: Consolas, monospace; font-size: 11.5px;
  }
</style>

/* ---------- Build flat node list with absolute world coords ---------- */
const NODES = new Map(); // id -> node
(function flatten(node, parent) {
  if (parent && parent.id !== 'root') { node.x += parent.x; node.y += parent.y; }
  node.parent = parent || null;
  NODES.set(node.id, node);
  (node.children || []).forEach(c => flatten(c, node));
})(TREE, null);

/* ---------- Render DOM ---------- */
const world = document.getElementById('world');
for (const node of NODES.values()) {
  if (node.id === 'root') continue;
  const el = document.createElement('div');
  el.className = 'node' + (node.plain ? ' plain' : ' clickable');
  el.dataset.id = node.id;
  const s = (2 * node.r) / BASE;
  el.style.transform = `translate(${node.x - node.r}px, ${node.y - node.r}px) scale(${s})`;
  el.innerHTML = `
    <div class="disc"></div>
    <div class="far">${node.far || ''}</div>
    ${node.near ? `<div class="near ${node.nearHasChildren ? 'has-children' : ''}">${node.near}</div>` : ''}`;
  world.appendChild(el);
  node.el = el;
  if (!node.plain) {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (animating) return;
      // already focused -> ignore; otherwise dive (works for siblings too)
      if (focused !== node) focusNode(node);
    });
  }
}

/* ---------- Camera ---------- */
const vp = document.getElementById('viewport');
let cam = { x: 0, y: 0, s: 0.1 };   // current
let animating = false;
let focused = TREE;

function applyCam() {
  const vw = innerWidth, vh = innerHeight;
  world.style.transform =
    `translate(${vw / 2 - cam.x * cam.s}px, ${vh / 2 - cam.y * cam.s}px) scale(${cam.s})`;
}

function targetFor(node) {
  const vw = innerWidth, vh = innerHeight;
  if (node.id === 'root') {
    // fit the whole map
    const extX = 3300, extY = 2150;
    return { x: 0, y: 50, s: Math.min(vw / (2 * extX), vh / (2 * extY)) };
  }
  const margin = 0.86;
  return { x: node.x, y: node.y, s: Math.min(vw, vh) * margin / (2 * node.r) };
}

const easeInOut = t => t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

function animateCam(to, duration = 900) {
  const from = { ...cam };
  const lf = Math.log(from.s), lt = Math.log(to.s);
  const t0 = performance.now();
  animating = true;
  function frame(now) {
    let t = Math.min(1, (now - t0) / duration);
    const e = easeInOut(t);
    cam.s = Math.exp(lf + (lt - lf) * e);
    cam.x = from.x + (to.x - from.x) * e;
    cam.y = from.y + (to.y - from.y) * e;
    applyCam();
    if (t < 1) requestAnimationFrame(frame);
    else animating = false;
  }
  requestAnimationFrame(frame);
}

/* ---------- Focus management ---------- */
function focusNode(node, { pushHash = true } = {}) {
  focused = node;
  // open the focused node and all its ancestors (semantic zoom)
  for (const n of NODES.values()) {
    if (n.el) n.el.classList.toggle('open', isAncestorOrSelf(n, node));
  }
  animateCam(targetFor(node));
  renderBreadcrumb();
  document.getElementById('back-btn').classList.toggle('visible', node.id !== 'root');
  if (pushHash) {
    const path = pathOf(node).slice(1).map(n => n.id).join('/');
    history.replaceState(null, '', path ? '#/' + path : '#/');
  }
}

function isAncestorOrSelf(maybeAncestor, node) {
  let n = node;
  while (n) { if (n === maybeAncestor) return true; n = n.parent; }
  return false;
}

function pathOf(node) {
  const path = [];
  let n = node;
  while (n) { path.unshift(n); n = n.parent; }
  return path;
}

function goUp() {
  if (focused.id !== 'root' && !animating) focusNode(focused.parent);
}

/* ---------- Breadcrumb ---------- */
function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const path = pathOf(focused);
  bc.innerHTML = path.map((n, i) =>
    `<span class="bc ${i === path.length - 1 ? 'current' : ''}" data-id="${n.id}">${n.label || n.id}</span>`
  ).join('<span class="sep">›</span>');
  bc.querySelectorAll('.bc:not(.current)').forEach(el =>
    el.addEventListener('click', () => focusNode(NODES.get(el.dataset.id))));
}

/* ---------- Inputs ---------- */
document.getElementById('back-btn').addEventListener('click', goUp);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') goUp(); });

// click on empty background -> go up one level
vp.addEventListener('click', () => { if (!animating) goUp(); });

// wheel: down = up one level, up = dive into hovered bubble
let wheelAcc = 0, wheelLock = 0;
addEventListener('wheel', (e) => {
  const now = performance.now();
  if (animating || now < wheelLock) return;
  wheelAcc += e.deltaY;
  if (wheelAcc > 120) {           // zoom out
    wheelAcc = 0; wheelLock = now + 600;
    goUp();
  } else if (wheelAcc < -120) {   // zoom in toward hovered bubble
    wheelAcc = 0;
    const hovered = document.elementFromPoint(e.clientX, e.clientY)?.closest('.node.clickable');
    if (hovered) {
      const node = NODES.get(hovered.dataset.id);
      if (node && node !== focused && !isAncestorOrSelf(node, focused)) {
        wheelLock = now + 600;
        focusNode(node);
      }
    }
  }
}, { passive: true });

addEventListener('resize', () => { focusNode(focused, { pushHash: false }); });

/* ---------- Deep links ---------- */
function applyHash() {
  const ids = location.hash.replace(/^#\//, '').split('/').filter(Boolean);
  const node = ids.length ? NODES.get(ids[ids.length - 1]) : TREE;
  focusNode(node || TREE, { pushHash: false });
}
addEventListener('hashchange', applyHash);

/* ---------- Init ---------- */
cam = { ...targetFor(TREE), s: 0.02 };  // start zoomed way out, then settle in
applyCam();
if (location.hash && location.hash !== '#/') applyHash();
else focusNode(TREE, { pushHash: false });
</script>
</body>
</html>

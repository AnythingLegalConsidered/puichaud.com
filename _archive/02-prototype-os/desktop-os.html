<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IanisOS — Portfolio</title>
<style>
  /* ============ RESET & THEME ============ */
  :root {
    --bg: #1e1e2e;
    --bg-alt: #181825;
    --surface: #313244;
    --surface-alt: #45475a;
    --text: #cdd6f4;
    --text-dim: #a6adc8;
    --accent: #89b4fa;
    --green: #a6e3a1;
    --red: #f38ba8;
    --yellow: #f9e2af;
    --orange: #fab387;
    --mauve: #cba6f7;
    --teal: #94e2d5;
    --titlebar-h: 34px;
    --taskbar-h: 44px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    user-select: none;
  }
  .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }

  /* ============ BOOT SCREEN ============ */
  #boot {
    position: fixed; inset: 0; z-index: 9999;
    background: #0a0a12;
    font-family: Consolas, monospace; font-size: 13px;
    color: #9ece6a; padding: 24px;
    transition: opacity .4s;
  }
  #boot.done { opacity: 0; pointer-events: none; }
  #boot .line { opacity: 0; animation: bootline .05s forwards; }
  @keyframes bootline { to { opacity: 1; } }

  /* ============ DESKTOP ============ */
  #desktop {
    position: fixed; inset: 0 0 var(--taskbar-h) 0;
    background:
      radial-gradient(ellipse at 70% 20%, #2a2a45 0%, transparent 55%),
      radial-gradient(ellipse at 20% 80%, #1f2a3a 0%, transparent 50%),
      linear-gradient(160deg, #1a1a2e 0%, #16161e 100%);
    overflow: hidden;
  }
  /* grid pattern wallpaper */
  #desktop::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(137,180,250,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(137,180,250,.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ============ DESKTOP ICONS ============ */
  #icons {
    position: absolute; top: 16px; left: 16px;
    display: grid; grid-template-rows: repeat(auto-fill, 92px);
    grid-auto-flow: column; gap: 8px;
    height: calc(100% - 32px);
  }
  .icon {
    width: 84px; height: 88px;
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; padding: 8px 4px;
    border-radius: 8px; cursor: pointer;
    border: 1px solid transparent;
  }
  .icon:hover { background: rgba(137,180,250,.10); border-color: rgba(137,180,250,.25); }
  .icon .glyph {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    background: linear-gradient(145deg, var(--surface), var(--bg-alt));
    box-shadow: 0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.07);
  }
  .icon .label {
    font-size: 11.5px; text-align: center; line-height: 1.25;
    color: var(--text); text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }

  /* ============ WINDOWS ============ */
  .window {
    position: absolute;
    min-width: 320px; min-height: 200px;
    background: var(--bg-alt);
    border: 1px solid var(--surface-alt);
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,.55);
    display: flex; flex-direction: column;
    resize: both; overflow: hidden;
    animation: winopen .15s ease-out;
  }
  @keyframes winopen { from { transform: scale(.95); opacity: 0; } }
  .window.focused { border-color: var(--accent); }
  .window.minimized { display: none; }
  .window.maximized {
    inset: 0 0 var(--taskbar-h) 0 !important;
    width: auto !important; height: auto !important;
    border-radius: 0; resize: none;
  }
  .titlebar {
    height: var(--titlebar-h); flex: none;
    display: flex; align-items: center; gap: 8px;
    padding: 0 10px;
    background: var(--surface);
    cursor: grab; font-size: 13px;
  }
  .window.focused .titlebar { background: linear-gradient(180deg, #3a3c55, var(--surface)); }
  .titlebar:active { cursor: grabbing; }
  .titlebar .t-icon { font-size: 14px; }
  .titlebar .t-title { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; color: var(--text-dim); }
  .window.focused .titlebar .t-title { color: var(--text); }
  .titlebar .t-btns { display: flex; gap: 6px; }
  .t-btn {
    width: 14px; height: 14px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 0;
  }
  .t-btn.min { background: var(--yellow); }
  .t-btn.max { background: var(--green); }
  .t-btn.close { background: var(--red); }
  .t-btn:hover { filter: brightness(1.25); }
  .win-body { flex: 1; overflow: auto; user-select: text; }

  /* ============ TASKBAR ============ */
  #taskbar {
    position: fixed; left: 0; right: 0; bottom: 0;
    height: var(--taskbar-h); z-index: 5000;
    background: rgba(24,24,37,.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--surface);
    display: flex; align-items: center; gap: 6px; padding: 0 8px;
  }
  #start-btn {
    height: 34px; padding: 0 14px; border-radius: 8px;
    border: none; cursor: pointer;
    background: linear-gradient(145deg, var(--accent), var(--mauve));
    color: #11111b; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; gap: 6px;
  }
  #start-btn:hover { filter: brightness(1.1); }
  #task-items { flex: 1; display: flex; gap: 4px; overflow-x: auto; }
  .task-item {
    height: 32px; padding: 0 12px; border-radius: 6px;
    border: 1px solid var(--surface); background: transparent;
    color: var(--text-dim); font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .task-item.active { background: var(--surface); color: var(--text); border-color: var(--accent); }
  #clock { font-size: 12px; color: var(--text-dim); padding: 0 10px; font-family: Consolas, monospace; }
  #tray-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--green); padding-right: 6px; }
  #tray-status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 50% { opacity: .4; } }

  /* ============ START MENU ============ */
  #start-menu {
    position: fixed; left: 8px; bottom: calc(var(--taskbar-h) + 8px);
    width: 300px; z-index: 6000;
    background: rgba(24,24,37,.97); backdrop-filter: blur(12px);
    border: 1px solid var(--surface-alt); border-radius: 12px;
    padding: 10px; display: none;
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
  }
  #start-menu.open { display: block; animation: winopen .12s ease-out; }
  #start-menu .sm-header { padding: 8px 10px 12px; border-bottom: 1px solid var(--surface); margin-bottom: 8px; }
  #start-menu .sm-header b { font-size: 14px; }
  #start-menu .sm-header span { display: block; font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .sm-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  .sm-item:hover { background: var(--surface); }
  .sm-item .glyph { font-size: 17px; width: 24px; text-align: center; }

  /* ============ APP: TERMINAL ============ */
  .term {
    background: #11111b; color: #cdd6f4;
    font-family: 'Cascadia Code', Consolas, monospace; font-size: 13px;
    padding: 12px; min-height: 100%;
    line-height: 1.5; cursor: text;
  }
  .term .out { white-space: pre-wrap; word-break: break-word; }
  .term .prompt-line { display: flex; }
  .term .ps1 { color: var(--green); white-space: pre; }
  .term input {
    flex: 1; background: transparent; border: none; outline: none;
    color: inherit; font: inherit;
  }
  .term .c-accent { color: var(--accent); }
  .term .c-green { color: var(--green); }
  .term .c-yellow { color: var(--yellow); }
  .term .c-red { color: var(--red); }
  .term .c-dim { color: #6c7086; }
  .term .c-mauve { color: var(--mauve); }

  /* ============ APP: MONITORING ============ */
  .mon { padding: 14px; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
  .mon .panel {
    background: var(--surface); border: 1px solid var(--surface-alt);
    border-radius: 8px; padding: 12px;
  }
  .mon .panel h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); margin-bottom: 8px; }
  .mon .big { font-size: 26px; font-weight: 700; font-family: Consolas, monospace; }
  .mon .big small { font-size: 12px; color: var(--text-dim); font-weight: 400; }
  .mon .green { color: var(--green); } .mon .yellow { color: var(--yellow); } .mon .accent { color: var(--accent); }
  .mon .spark { width: 100%; height: 60px; margin-top: 6px; }
  .skillbar { margin-bottom: 8px; }
  .skillbar .sb-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
  .skillbar .sb-track { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .skillbar .sb-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--teal)); animation: fillbar 1s ease-out; }
  @keyframes fillbar { from { width: 0; } }
  .mon table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .mon table td { padding: 5px 4px; border-bottom: 1px solid var(--surface-alt); }
  .mon .badge { padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .mon .badge.ok { background: rgba(166,227,161,.15); color: var(--green); }
  .mon .badge.warn { background: rgba(249,226,175,.15); color: var(--yellow); }

  /* ============ APP: PIPELINE ============ */
  .pipe { padding: 24px 18px; }
  .pipe .stage { display: flex; gap: 14px; position: relative; padding-bottom: 28px; }
  .pipe .stage:not(:last-child)::before {
    content: ''; position: absolute; left: 15px; top: 34px; bottom: 0;
    width: 2px; background: var(--surface-alt);
  }
  .pipe .stage.done:not(:last-child)::before { background: var(--green); }
  .pipe .s-dot {
    width: 32px; height: 32px; flex: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; z-index: 1;
    background: var(--surface); border: 2px solid var(--surface-alt);
  }
  .pipe .done .s-dot { border-color: var(--green); background: rgba(166,227,161,.12); }
  .pipe .running .s-dot { border-color: var(--yellow); background: rgba(249,226,175,.12); animation: pulse 1.5s infinite; }
  .pipe .s-body { flex: 1; }
  .pipe .s-title { font-weight: 600; font-size: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pipe .s-tag { font-size: 10px; font-family: Consolas, monospace; padding: 1px 8px; border-radius: 4px; }
  .pipe .done .s-tag { background: rgba(166,227,161,.15); color: var(--green); }
  .pipe .running .s-tag { background: rgba(249,226,175,.15); color: var(--yellow); }
  .pipe .pending .s-tag { background: var(--surface); color: var(--text-dim); }
  .pipe .s-detail { font-size: 12.5px; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }
  .pipe .s-log {
    margin-top: 8px; padding: 8px 10px; border-radius: 6px;
    background: #11111b; font-family: Consolas, monospace;
    font-size: 11px; color: #7f849c; line-height: 1.6;
  }
  .pipe .s-log .ok { color: var(--green); }

  /* ============ APP: PROJETS ============ */
  .proj { display: flex; min-height: 100%; }
  .proj .p-side {
    width: 190px; flex: none; border-right: 1px solid var(--surface);
    background: var(--bg-alt); padding: 8px;
  }
  .proj .p-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 10px; border-radius: 8px; cursor: pointer;
    font-size: 12.5px; margin-bottom: 2px; color: var(--text-dim);
  }
  .proj .p-item:hover { background: var(--surface); }
  .proj .p-item.active { background: var(--surface); color: var(--text); border-left: 3px solid var(--accent); }
  .proj .p-detail { flex: 1; padding: 18px 20px; line-height: 1.65; font-size: 13px; overflow: auto; }
  .proj .p-detail h2 { font-size: 17px; margin-bottom: 2px; }
  .proj .p-detail .p-sub { color: var(--text-dim); font-size: 12px; margin-bottom: 14px; }
  .proj .p-detail h3 { font-size: 12px; color: var(--accent); margin: 14px 0 5px; text-transform: uppercase; letter-spacing: .5px; }
  .proj .p-detail ul { padding-left: 18px; }
  .proj .p-detail li { margin-bottom: 3px; }
  .proj .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }
  .proj .tag {
    font-size: 10.5px; font-family: Consolas, monospace;
    padding: 2px 9px; border-radius: 10px;
    background: rgba(137,180,250,.12); color: var(--accent);
    border: 1px solid rgba(137,180,250,.25);
  }
  .proj .stat-row { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
  .proj .stat {
    background: var(--surface); border-radius: 8px; padding: 8px 14px;
    text-align: center;
  }
  .proj .stat b { display: block; font-size: 17px; font-family: Consolas, monospace; color: var(--green); }
  .proj .stat span { font-size: 10.5px; color: var(--text-dim); }

  /* ============ APP: NETWORK MAP ============ */
  .netmap { width: 100%; height: 100%; min-height: 380px; display: block; }
  .netmap .node { cursor: pointer; }
  .netmap .node circle { fill: var(--surface); stroke: var(--surface-alt); stroke-width: 2; transition: all .15s; }
  .netmap .node:hover circle { stroke: var(--accent); fill: #3a3c55; }
  .netmap .node.core circle { fill: rgba(137,180,250,.15); stroke: var(--accent); }
  .netmap .node text { fill: var(--text); font-size: 11px; text-anchor: middle; pointer-events: none; }
  .netmap .node .nico { font-size: 16px; }
  .netmap line { stroke: var(--surface-alt); stroke-width: 1.5; stroke-dasharray: 4 4; animation: dashmove 20s linear infinite; }
  @keyframes dashmove { to { stroke-dashoffset: -200; } }
  .net-info {
    padding: 10px 14px; font-size: 12.5px; color: var(--text-dim);
    border-top: 1px solid var(--surface); background: var(--bg-alt);
    min-height: 58px; line-height: 1.5;
  }
  .net-info b { color: var(--text); }

  /* ============ APP: INCIDENT ============ */
  .incident { padding: 20px; font-size: 13.5px; line-height: 1.7; max-width: 640px; }
  .incident .inc-banner {
    background: rgba(243,139,168,.12); border: 1px solid var(--red);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 18px;
    color: var(--red); font-weight: 600; font-size: 13px;
    display: flex; gap: 8px; align-items: center;
  }
  .incident h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: var(--text-dim); margin: 18px 0 6px; }
  .incident .resolved { color: var(--green); font-weight: 600; }
  .incident a { color: var(--accent); }
  .incident code { background: var(--surface); padding: 1px 6px; border-radius: 4px; font-size: 12px; }

  /* ============ APP: ABOUT / README ============ */
  .about { padding: 22px; max-width: 600px; line-height: 1.7; font-size: 13.5px; }
  .about h2 { font-size: 19px; margin-bottom: 4px; }
  .about .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 16px; }
  .about h3 { font-size: 13px; color: var(--accent); margin: 16px 0 6px; text-transform: uppercase; letter-spacing: .5px; }
  .about ul { padding-left: 20px; }
  .about li { margin-bottom: 4px; }
  .about kbd {
    background: var(--surface); border: 1px solid var(--surface-alt);
    border-radius: 4px; padding: 1px 6px; font-size: 11px; font-family: Consolas, monospace;
  }

  /* ============ APP: CONTACT ============ */
  .contact { padding: 24px; max-width: 520px; }
  .contact .row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border: 1px solid var(--surface); border-radius: 8px;
    margin-bottom: 10px; font-size: 13.5px;
  }
  .contact .row .glyph { font-size: 20px; }
  .contact .row a { color: var(--accent); text-decoration: none; }
  .contact .row a:hover { text-decoration: underline; }
  .contact .row small { display: block; color: var(--text-dim); font-size: 11.5px; }
</style>
</head>

<!-- DESKTOP -->

  <div id="icons"></div>
</div>

<!-- START MENU -->
<div id="start-menu">
  <div class="sm-header">
    <b>Ianis Puichaud</b>
    <span>AdminSys & Réseau → DevOps · Nantes</span>
  </div>
  <div id="sm-items"></div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
  <button id="start-btn">⬢ ianisOS</button>

<script>
/* ================================================================
   IanisOS — prototype portfolio "OS dans le navigateur" — v2
   Contenu réel issu du parcours (Equans, EPSI, homelab, Hexalith).
   Single-file, zero dependency.
   ================================================================ */

/* ---------- Window Manager ---------- */
const WM = {
  z: 100,
  windows: new Map(),
  desktop: document.getElementById('desktop'),
  taskItems: document.getElementById('task-items'),
  cascade: 0,

  open(appId) {
    const existing = this.windows.get(appId);
    if (existing) {
      existing.el.classList.remove('minimized');
      this.focus(appId);
      return;
    }
    const app = APPS[appId];
    const el = document.createElement('div');
    el.className = 'window';
    el.style.width = (app.w || 560) + 'px';
    el.style.height = (app.h || 420) + 'px';
    const offset = 40 + (this.cascade++ % 6) * 32;
    el.style.left = Math.min(offset + 120, window.innerWidth - 600) + 'px';
    el.style.top = offset + 'px';

    el.innerHTML = `
      <div class="titlebar">
        <span class="t-icon">${app.icon}</span>
        <span class="t-title">${app.title}</span>
        <span class="t-btns">
          <button class="t-btn min" title="Réduire"></button>
          <button class="t-btn max" title="Agrandir"></button>
          <button class="t-btn close" title="Fermer"></button>
        </span>
      </div>
      <div class="win-body"></div>`;
    this.desktop.appendChild(el);

    const body = el.querySelector('.win-body');
    app.render(body, el);

    const task = document.createElement('button');
    task.className = 'task-item';
    task.innerHTML = `<span>${app.icon}</span>${app.name}`;
    task.onclick = () => {
      if (el.classList.contains('minimized')) {
        el.classList.remove('minimized');
        this.focus(appId);
      } else if (el.classList.contains('focused')) {
        el.classList.add('minimized');
        task.classList.remove('active');
      } else {
        this.focus(appId);
      }
    };
    this.taskItems.appendChild(task);

    this.windows.set(appId, { el, task });

    el.querySelector('.t-btn.close').onclick = (e) => { e.stopPropagation(); this.close(appId); };
    el.querySelector('.t-btn.min').onclick = (e) => { e.stopPropagation(); el.classList.add('minimized'); task.classList.remove('active'); };
    el.querySelector('.t-btn.max').onclick = (e) => { e.stopPropagation(); el.classList.toggle('maximized'); };
    el.querySelector('.titlebar').ondblclick = () => el.classList.toggle('maximized');
    el.addEventListener('pointerdown', () => this.focus(appId));

    this.makeDraggable(el);
    this.focus(appId);
  },

  close(appId) {
    const w = this.windows.get(appId);
    if (!w) return;
    w.el.remove();
    w.task.remove();
    this.windows.delete(appId);
  },

  focus(appId) {
    for (const [id, w] of this.windows) {
      const on = id === appId;
      w.el.classList.toggle('focused', on);
      w.task.classList.toggle('active', on);
      if (on) w.el.style.zIndex = ++this.z;
    }
    const w = this.windows.get(appId);
    const inp = w?.el.querySelector('.term input');
    if (inp) setTimeout(() => inp.focus(), 0);
  },

  makeDraggable(el) {
    const bar = el.querySelector('.titlebar');
    bar.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.t-btn') || el.classList.contains('maximized')) return;
      const startX = e.clientX, startY = e.clientY;
      const rect = el.getBoundingClientRect();
      const move = (ev) => {
        el.style.left = Math.max(-rect.width + 80, rect.left + ev.clientX - startX) + 'px';
        el.style.top = Math.max(0, rect.top + ev.clientY - startY) + 'px';
      };
      const up = () => {
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
      };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
    });
  }
};

/* ---------- Data ---------- */
const PROFILE = {
  name: 'Ianis Puichaud',
  role: 'Administrateur Systèmes & Réseau (alternance) — cap DevOps',
  location: 'Nantes, France',
  email: 'ianis@puichaud.com',
  github: 'https://github.com/AnythingLegalConsidered',
  school: 'EPSI Nantes — BAC+3 SYSOPS (promo 2026)',
  company: 'Equans France — équipe Support Poste de Travail (N2)',
};

/* ---------- Projets (source: dossier RNCP + labs) ---------- */
const PROJECTS = {
  hexalith: {
    icon: '🛡️', name: 'Hexalith', sub: 'Lab GitOps — SI complet d\'une ESN fictive de 150 collaborateurs',
    html: `
      <h3>Le concept</h3>
      <p>Concevoir et déployer de zéro le système d'information d'une ESN fictive (Hexalith, 150 collaborateurs) :
      audit, analyse de risques EBIOS RM, architecture, budget, POC, plan de déploiement 30/60/90 jours.
      Le tout versionné et déployé en GitOps.</p>

/* ---------- Desktop icons & start menu ---------- */
const ICON_ORDER = ['readme', 'projets', 'terminal', 'monitoring', 'pipeline', 'network', 'incident', 'contact'];
const iconsEl = document.getElementById('icons');
const smItems = document.getElementById('sm-items');

for (const id of ICON_ORDER) {
  const app = APPS[id];
  const icon = document.createElement('div');
  icon.className = 'icon';
  icon.innerHTML = `<div class="glyph">${app.icon}</div><div class="label">${app.name}</div>`;
  icon.addEventListener('dblclick', () => WM.open(id));
  iconsEl.appendChild(icon);

  const sm = document.createElement('div');
  sm.className = 'sm-item';
  sm.innerHTML = `<span class="glyph">${app.icon}</span>${app.title}`;
  sm.addEventListener('click', () => { WM.open(id); toggleStart(false); });
  smItems.appendChild(sm);
}

/* ---------- Start menu ---------- */
const startMenu = document.getElementById('start-menu');
const startBtn = document.getElementById('start-btn');
function toggleStart(force) {
  startMenu.classList.toggle('open', force);
}
startBtn.addEventListener('click', (e) => { e.stopPropagation(); startMenu.classList.toggle('open'); });
document.addEventListener('click', (e) => {
  if (!startMenu.contains(e.target)) toggleStart(false);
});

/* ---------- Clock ---------- */
const clock = document.getElementById('clock');
function tick() {
  const d = new Date();
  clock.textContent = d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' }) + ' ' +
    d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}
tick(); setInterval(tick, 10000);

/* ---------- Boot sequence ---------- */
const BOOT_LINES = [
  '[  OK  ] Starting ianisOS v2.0 (prototype)…',
  '[  OK  ] Mounted /dev/motivation (ext4, rw)',
  '[  OK  ] Started service: homelab-proxmox.service (2 nodes, 17 LXC)',
  '[  OK  ] Started service: hexalith-gitops.service (terraform, ansible)',
  '[  OK  ] Started service: datacommune-api.service',
  '[  OK  ] Reached target: alternance.target (Equans — ASR N2)',
  '[ WAIT ] Resolving master-infra-cloud.target… ETA 09/2026',
  '[  OK  ] Starting desktop environment…',
];
const boot = document.getElementById('boot');
BOOT_LINES.forEach((l, i) => {
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = l;
    boot.appendChild(div);
  }, 120 * i);
});
setTimeout(() => {
  boot.classList.add('done');
  WM.open('readme');
}, 120 * BOOT_LINES.length + 500);
